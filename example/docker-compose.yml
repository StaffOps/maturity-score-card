services:
  api:
    build: ..
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://maturity:maturity@postgres:5432/maturity}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      victoriametrics:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: maturity
      POSTGRES_PASSWORD: maturity
      POSTGRES_DB: maturity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maturity"]
      interval: 5s
      timeout: 5s
      retries: 5

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - victoriametrics_data:/victoria-metrics-data
      - ./prometheus/scrape.yml:/etc/victoriametrics/scrape.yml:ro
    command:
      - -storageDataPath=/victoria-metrics-data
      - -httpListenAddr=:8428
      - -promscrape.config=/etc/victoriametrics/scrape.yml

  vmalert:
    image: victoriametrics/vmalert:latest
    volumes:
      - ./prometheus/rules:/etc/vmalert/rules:ro
    command:
      - -rule=/etc/vmalert/rules/*.yml
      - -datasource.url=http://victoriametrics:8428
      - -remoteWrite.url=http://victoriametrics:8428
      - -evaluationInterval=15s
      - -httpListenAddr=:8880
    depends_on:
      - victoriametrics

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - victoriametrics

volumes:
  victoriametrics_data:
  grafana_data:
  postgres_data:
