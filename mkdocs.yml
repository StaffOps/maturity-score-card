site_name: StaffOps — Maturity Score Card
site_description: Stateless scoring service for CI/CD maturity metrics
site_url: https://staffops.github.io/maturity-score-card/
repo_url: https://github.com/StaffOps/maturity-score-card
repo_name: maturity-score-card
edit_uri: edit/main/docs/site/

docs_dir: docs/site

theme:
  name: material
  custom_dir: docs/site/overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
  - Scorecards: scorecards.md
  - Reference:
      - API: reference/api.md
      - Metrics & Recording Rules: reference/metrics.md
      - Pipeline Integration: reference/pipeline-integration.md

plugins:
  - search:
      lang: en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StaffOps
  generator: false

copyright: Copyright &copy; StaffOps Contributors — Apache 2.0
